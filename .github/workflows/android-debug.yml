name: Android Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_CMDLINE_TOOLS: /usr/local/lib/android/sdk/cmdline-tools/latest/bin
  ANDROID_PLATFORM_TOOLS: /usr/local/lib/android/sdk/platform-tools

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Android SDK tools
        run: echo "$ANDROID_CMDLINE_TOOLS" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          echo "$ANDROID_PLATFORM_TOOLS" >> "$GITHUB_PATH"
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Build unsigned release APK
        run: gradle assembleRelease --stacktrace

      - name: Decode signing keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release-signing.p12"

      - name: Sign release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p release
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/release-signing.p12" \
            --ks-type PKCS12 \
            --ks-pass "pass:$RELEASE_STORE_PASSWORD" \
            --key-pass "pass:$RELEASE_STORE_PASSWORD" \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --out release/sds-mobile-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          "$BUILD_TOOLS/apksigner" verify release/sds-mobile-release.apk

      - name: Publish GitHub Release
        if: github.ref_type == 'branch' && (github.ref_name == 'master' || github.ref_name == 'main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf '%s\n' \
            "Automated release APK build." \
            "" \
            "- Commit: ${GITHUB_SHA}" \
            "- Branch: ${GITHUB_REF_NAME}" \
            "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > release/notes.txt
          gh release create "$TAG" release/sds-mobile-release.apk \
            --target "$GITHUB_SHA" \
            --title "Release APK ${SHORT_SHA}" \
            --notes-file release/notes.txt

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: sds-mobile-release-apk
          path: release/sds-mobile-release.apk
          if-no-files-found: error
