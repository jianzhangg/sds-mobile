name: Android Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_CMDLINE_TOOLS: /usr/local/lib/android/sdk/cmdline-tools/latest/bin
  ANDROID_PLATFORM_TOOLS: /usr/local/lib/android/sdk/platform-tools

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Android SDK tools
        run: echo "$ANDROID_CMDLINE_TOOLS" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          echo "$ANDROID_PLATFORM_TOOLS" >> "$GITHUB_PATH"
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: sds-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
