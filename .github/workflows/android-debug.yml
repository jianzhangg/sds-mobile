name: Android Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_CMDLINE_TOOLS: /usr/local/lib/android/sdk/cmdline-tools/latest/bin
  ANDROID_PLATFORM_TOOLS: /usr/local/lib/android/sdk/platform-tools

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Android SDK tools
        run: echo "$ANDROID_CMDLINE_TOOLS" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          echo "$ANDROID_PLATFORM_TOOLS" >> "$GITHUB_PATH"
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Publish GitHub Release
        if: github.ref_type == 'branch' && (github.ref_name == 'master' || github.ref_name == 'main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/sds-mobile-debug.apk
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="debug-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          printf '%s\n' \
            "Automated debug APK build." \
            "" \
            "- Commit: ${GITHUB_SHA}" \
            "- Branch: ${GITHUB_REF_NAME}" \
            "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > release/notes.txt
          gh release create "$TAG" release/sds-mobile-debug.apk \
            --target "$GITHUB_SHA" \
            --title "Debug APK ${SHORT_SHA}" \
            --notes-file release/notes.txt

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: sds-mobile-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
